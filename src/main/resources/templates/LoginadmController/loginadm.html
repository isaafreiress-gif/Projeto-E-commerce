<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro | Zion Tech Store</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/login.js"></script>

</head>
<body class="login-body">
<header>
  <div class="logo">Zion Tech Store</div>
  <nav>
    <ul>
      <li><a href="login">Voltar</a></li>
    </ul>
  </nav>
</header>


<section id="cadastro" class="secao-auditoria" style="margin-top: 30px;">
  <h3>🔐 Login Administrador</h3>
  <form id="form-cadastro-adm" class="form-admin">
    <div class="campo">
      <label>Número de Matrícula</label>
      <input type="number" id="adm-matricula" placeholder="Ex: 2026001" required>
    </div>
    <div class="campo">
      <label>Senha de Acesso</label>
      <input type="password" id="adm-senha" placeholder="••••••••" required>
    </div>

    <button type="button" class="btn-comprar" onclick="logarAdm()">Validar ADM</button>
  </form>

  <div id="lista-adms" style="margin-top: 20px;"></div>
</section>

</body>
</html>
