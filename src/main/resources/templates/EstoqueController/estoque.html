<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Zion Tech | Controle de Estoque</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body class="Cadastroprodutos">

<div class="admin-container">
  <aside class="sidebar">
    <h2>Zion Admin</h2>
    <nav>
      <a href="paginaadm">📊 Dashboard</a>
      <a href="usuario">👤 Usuários</a>
      <a href="cadastroproduto">📦 Novo Produto</a>
      <a href="estoque" class="active">📋 Estoque</a>
      <a href="cadastroadm">👤 Cadastrar ADM</a>
      <a href="produto" style="margin-top: 40px; border: 1px solid #a100d5; display: block; text-align: center;">Voltar para Loja</a>
      <a href="#" onclick="logout()" style="color: #ff4d4d;">Sair</a>
    </nav>
  </aside>

  <main class="conteudo-principal">
    <h1>📋 Controle de Estoque</h1>

    <div class="secao-auditoria">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 class="titulo-sessao">Produtos Listados</h2>
        <button class="btn-salvar" onclick="window.location.href='cadastroproduto'" style="padding: 10px 20px; font-size: 0.9rem;">+ Adicionar Produto</button>
      </div>

      <div class="tabela-container">
        <table class="tabela-usuarios">
          <thead>
          <tr>
            <th>ID</th>
            <th>Imagem</th>
            <th>Nome do Produto</th>
            <th>Preço</th>
            <th>Status</th>
            <th>quantidade</th>
          </tr>
          </thead>
          <tbody id="tabela-estoque-corpo"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/script.js"></script>
</body>
</html>
