<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
</head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Orbitron:wght@900&display=swap"
      rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="js/login.js">
</head>
<body class="login-body">

<div class="container-login">
  <div class="card-login">
    <h2>CRIE SUA CONTA</h2>

    <form action="#" method="POST">
      <div class="campo">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
      </div>

      <div class="campo">
        <label for="confirma-senha">Confirmar Senha</label>
        <input type="password" id="confirma-senha" name="confirma-senha" placeholder="Repita a senha" required>
      </div>

      <button type="submit" class="btn-comprar" style="margin-top: 10px;">CADASTRAR</button>
    </form>

    <div class="link-registro">
      Já tem uma conta? <a href="login.html">Faça Login</a>
    </div>
  </div>
</div>

</body>
</html>
