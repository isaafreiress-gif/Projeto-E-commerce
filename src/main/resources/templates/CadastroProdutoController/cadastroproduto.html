<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Zion Tech | Cadastrar Produto</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body class="Cadastroprodutos">

<div class="admin-container">
  <aside class="sidebar">
    <h2>Zion Admin</h2>
    <nav>
      <a href="paginaadm">📊 Dashboard</a>
      <a href="usuario">👤 Usuários</a>
      <a href="cadastroproduto" class="active">📦 Novo Produto</a>
      <a href="estoque">📋 Estoque</a>
      <a href="cadastroadm">👤 Cadastrar ADM</a>
      <a href="produto" style="margin-top: 40px; border: 1px solid #a100d5; display: block; text-align: center;">Voltar para Loja</a>
      <a href="#" onclick="logout()" style="color: #ff4d4d;">Sair</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="form-card">
      <h2>📦 Cadastrar Novo Produto</h2>
      <p>Insira as informações do produto para disponibilizá-lo na loja virtual.</p>
      <hr>

      <form id="form-produto">
        <div class="input-group">
          <label for="prod-nome">Nome do Produto</label>
          <input type="text" id="prod-nome" placeholder="Ex: Teclado Mecânico RGB" required>
        </div>

        <div class="input-group">
          <label for="prod-preco">Preço (R$)</label>
          <input type="number" id="prod-preco" step="0.01" min="0.01" placeholder="Ex: 299.90" required>
        </div>

        <div class="input-group">
          <label for="prod-imagem">Link da Imagem (URL)</label>
          <input type="text" id="prod-imagem" placeholder="Ex: https://linkdaimagem.com/foto.jpg" required>
        </div>

        <div class="input-group">
          <label for="prod-descricao">Descrição do Produto</label>
          <textarea id="prod-descricao" rows="5" placeholder="Fale brevemente sobre os recursos do produto..." required></textarea>
        </div>

        <div class="button-container">
          <button type="button" class="btn-salvar" onclick="cadastrarProduto()">Salvar Produto</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="js/script.js"></script>
</body>
</html>
