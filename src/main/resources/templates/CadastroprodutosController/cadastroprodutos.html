<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Cadastrar Produto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-container">
    <aside class="sidebar">
        <h2>ADMIN</h2>
        <nav>
            <a href="dashboard">📊 Dashboard</a>
            <a href="#" class="active">📦 Cadastrar Produto</a>
            <a href="#">🛒 Gerenciar Vendas</a>
            <a href="#">👥 Clientes</a>
            <a href="#">⚙️ Configurações</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="form-card">
            <h2>Cadastrar Novo Produto</h2>
            <p>Preencha as informações abaixo para disponibilizar o produto na loja.</p>
            <hr>

            <form id="form-produto">
                <div class="input-group">
                    <label for="prod-nome">Nome do Produto</label>
                    <input type="text" id="prod-nome" placeholder="Ex: Teclado Mecânico RGB" required>
                </div>

                <div class="input-group">
                    <label for="prod-preco">Preço de Venda (R$)</label>
                    <input type="number" id="prod-preco" step="0.01" placeholder="0.00" required>
                </div>

                <div class="input-group">
                    <label for="prod-descricao">Descrição do Produto</label>
                    <textarea id="prod-descricao" rows="5" placeholder="Escreva as especificações técnicas e detalhes do produto..."></textarea>
                </div>

                <div class="button-container">
                    <button type="button" class="btn-salvar" onclick="cadastrarProduto()">Salvar Produto</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="js/Script.js"></script>
</body>
</html>
